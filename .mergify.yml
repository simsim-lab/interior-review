queue_rules:
  - name: default
    merge_method: merge
    queue_conditions: &ci_pass
      - check-success = lint
      - check-success = test
      - check-success = types
      - check-success = build
      - check-success = e2e
      - check-success = codeql
      - check-success = CodeQL
      - check-success = semgrep
      - check-success = gitleaks
      - check-success = npm-audit
    merge_conditions: *ci_pass

  - name: dependabot
    merge_method: squash
    queue_conditions: *ci_pass
    merge_conditions: *ci_pass

pull_request_rules:
  - name: dismiss approvals on new commits
    conditions:
      - base = main
    actions:
      dismiss_reviews:
        approved: true
        message: "New commits pushed — approvals dismissed."

  - name: auto-queue Dependabot PRs when CI passes
    conditions:
      - base = main
      - author = dependabot[bot]
    actions:
      review:
        type: APPROVE
        message: Dependabot PR — all CI checks passed, auto-approving.
      queue:
        name: dependabot

  - name: auto-queue PRs when all CI passes
    # 사람 PR도 필수 CI 가 모두 통과하면 Mergify 가 머지 큐에 넣어 자동 머지한다.
    # 막고 싶으면 draft 로 두거나 do-not-merge 라벨을 붙인다. (dependabot 은 위 전용 룰 사용)
    # 주의: pull_request_rules 의 `merge` 액션은 deprecated 라 자동 실행되지 않는다.
    #       반드시 `queue` 액션 + 위 queue_rules 조합을 써야 자동 머지된다.
    conditions:
      - base = main
      - author != dependabot[bot]
      - -draft
      - -conflict
      - label != do-not-merge
    actions:
      queue:
        name: default
