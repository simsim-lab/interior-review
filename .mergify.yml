pull_request_rules:
  - name: dismiss approvals on new commits
    conditions:
      - base = main
    actions:
      dismiss_reviews:
        approved: true
        message: "New commits pushed — approvals dismissed."

  - name: auto-merge Dependabot PRs when CI passes
    conditions:
      - base = main
      - author = dependabot[bot]
      - check-success = lint
      - check-success = test
      - check-success = types
      - check-success = build
      - check-success = e2e
      - check-success = codeql
      - check-success = CodeQL
      - check-success = semgrep
      - check-success = gitleaks
      - check-success = npm-audit
    actions:
      review:
        type: APPROVE
        message: Dependabot PR — all CI checks passed, auto-approving.
      merge:
        method: squash
        commit_message_format:
          title: pr-title
          body: pr-body

  - name: auto-merge PRs when all CI passes
    # 사람 PR도 필수 CI 가 모두 통과하면 Mergify 가 자동 머지한다.
    # 막고 싶으면 draft 로 두거나 `do-not-merge` 라벨을 붙인다. (dependabot 은 위 전용 룰 사용)
    conditions:
      - base = main
      - author != dependabot[bot]
      - -draft
      - -conflict
      - -label = do-not-merge
      - check-success = lint
      - check-success = test
      - check-success = types
      - check-success = build
      - check-success = e2e
      - check-success = codeql
      - check-success = CodeQL
      - check-success = semgrep
      - check-success = gitleaks
      - check-success = npm-audit
    actions:
      merge:
        method: merge
