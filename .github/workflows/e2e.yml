name: e2e

# Playwright E2E — seed 모드 dev 서버(bypass off/on 두 포트)로 사용자 플로우 검증.
# 유닛(test.yml)과 분리: E2E 는 브라우저 설치로 무거우므로 별도 job.
# 커버: 라우팅 리다이렉트 / 공개 페이지 / 체크리스트 접근 차단 / 라이트박스 전체화면 /
#       dev-bypass 관리자 체크리스트·편집. 요구사항 근거는 docs/REQUIREMENTS.md 참조.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npx playwright test

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
