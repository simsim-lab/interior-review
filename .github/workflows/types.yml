name: types

# Mechanical type check — tsc --noEmit (tsconfig strict). AI reviewer 는 검토 금지 — mechanical.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: types-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  types:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: tsc --noEmit
        run: npm run typecheck
