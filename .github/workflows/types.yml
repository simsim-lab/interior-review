name: types

# Mechanical type check — tsc --noEmit (tsconfig strict). AI reviewer 는 검토 금지 — mechanical.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: types-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  types:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: tsc --noEmit
        run: npm run typecheck
