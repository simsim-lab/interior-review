name: types

# Mechanical type check — tsc --noEmit (tsconfig strict). AI reviewer 는 검토 금지 — mechanical.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: types-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  types:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: tsc --noEmit
        run: npm run typecheck
