name: secrets

# Secret scan (gitleaks) — GitHub Push Protection 의 PR 후 backstop.
# Push Protection 이 commit 을 차단하지만, bypass / 이전 commit 의 secret 추가 catch.

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # 매주 화요일 03:00 UTC — 새 rule 적용 catch.
    - cron: "0 3 * * 2"

permissions:
  contents: read

concurrency:
  group: secrets-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install gitleaks CLI
        # gitleaks-action@v2 는 org repo 에서 license key(유료) 의무 → CLI binary 직접 사용(OSS, 무료).
        run: |
          GITLEAKS_VERSION="8.21.2"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: gitleaks scan
        # --redact: log 안 secret redact. --exit-code 1: 발견 시 fail. full history.
        run: |
          gitleaks detect \
            --source=. \
            --report-format=json \
            --report-path=gitleaks-report.json \
            --redact \
            --no-banner \
            --exit-code=1 \
            --verbose

      - name: Upload gitleaks report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          if-no-files-found: ignore
          retention-days: 14
