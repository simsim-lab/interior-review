name: lint

# Mechanical lint (ESLint flat config) — PR mechanical 영역.
# eslint.config.mjs = eslint-config-next 16 (core-web-vitals + typescript). AI reviewer 는 검토 금지.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Design tokens (색 하드코딩 금지)
        run: npm run lint:tokens
